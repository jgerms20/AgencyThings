name: Apply Digital Brief Template Source Upgrades

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/apply-digital-brief-template-source-upgrades.yml

permissions:
  contents: write

env:
  TARGET_BRANCH: version-2-latest-digital-task-brief-maker-2026-06-25-0001-utc

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply resilient app upgrade
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import re
          import textwrap

          INDEX = Path('tools/digital-task-brief-maker/index.html')
          APP = Path('tools/digital-task-brief-maker/src/app.js')
          MEDIA = Path('tools/digital-task-brief-maker/src/mediaPlan.js')
          CSS = Path('tools/digital-task-brief-maker/src/styles.css')
          TEST = Path('tests/digital-task-brief-maker/media-plan.test.mjs')

          def read(path):
              return Path(path).read_text()

          def write(path, text):
              Path(path).write_text(text)

          def clean(block):
              return textwrap.dedent(block).strip('\n')

          def sub(path, pattern, replacement, flags=re.S, required=True):
              text = read(path)
              if callable(replacement):
                  new, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              else:
                  new, count = re.subn(pattern, lambda _match: replacement, text, count=1, flags=flags)
              if count == 0 and required:
                  raise RuntimeError(f'Missing pattern in {path}: {pattern[:120]}')
              if count:
                  write(path, new)
              return count

          def replace(path, old, new, required=True):
              text = read(path)
              if old not in text:
                  if required:
                      raise RuntimeError(f'Missing text in {path}: {old[:120]}')
                  return False
              write(path, text.replace(old, new, 1))
              return True

          def insert_before(path, marker, insertion, sentinel):
              text = read(path)
              if sentinel in text:
                  return False
              if marker not in text:
                  raise RuntimeError(f'Missing marker in {path}: {marker[:120]}')
              write(path, text.replace(marker, insertion + '\n\n' + marker, 1))
              return True

          stamp = datetime.now(ZoneInfo('America/Los_Angeles')).strftime('%Y-%m-%d %-I:%M %p PT')
          cache_stamp = datetime.now(ZoneInfo('America/Los_Angeles')).strftime('%Y-%m-%d-%H%M-pt-template-source-upgrades')

          # HTML: timestamp, upload copy, review controls, template controls, and export labels.
          sub(INDEX, r"<div class='build-badge'>Current build: .*?</div>", f"<div class='build-badge'>Current build: template + source upgrades - {stamp}</div>")
          sub(INDEX, r"<div class='paste-panel'>\s*<label for='plan-input'>.*?</label>\s*<textarea id='plan-input'[^>]*></textarea>\s*</div>", clean("""
          <div class='paste-panel'>
            <div class='paste-panel-header'>
              <label for='plan-input'>Paste table rows instead</label>
              <small>Use this only when you do not have a file. Keep columns separated by tabs or commas.</small>
            </div>
            <textarea id='plan-input' spellcheck='false' wrap='off' placeholder='Bucket,Channel,Partner,Asset,Format,Specs,Quantity&#10;SOCIAL,Social Video,Meta,:06s / :15s / :30s,mp4,4x5 / 9x16 / 1x1,3&#10;AUDIO,Streaming Audio,Spotify,:15s / :30s Audio Spot,Audio File,:15s / :30s,1'></textarea>
          </div>
          """))
          sub(INDEX, r"<button id='approve-confident' type='button' class='secondary'>.*?</button>\s*<button id='mark-all-tbd' type='button' class='secondary'>.*?</button>", clean("""
          <button id='approve-confident' type='button' class='secondary'>Approve all matches</button>
          <button id='approve-selected' type='button' class='secondary'>Approve selected</button>
          <button id='mark-all-tbd' type='button' class='secondary'>Reset to TBD</button>
          """))
          sub(INDEX, r"<span id='deck-count' class='pill'>.*?</span>", "<span id='deck-count' class='pill'>Deck outline</span>")
          sub(INDEX, r"<label>Client name.*?<label>Primary brand color<input id='primary-color'.*?</label>\s*<label>Accent brand color<input id='accent-color'.*?</label>", clean("""
          <label>Client name<input id='client-name' name='clientName' type='text' placeholder='Client / brand' /></label>
          <label>Campaign or job<input id='campaign-name' name='campaignName' type='text' placeholder='Campaign name' /></label>
          <label>Campaign year<input id='campaign-year' name='campaignYear' type='text' placeholder='2026' /></label>
          <label>Max slides<input id='slide-count' name='slideCount' type='number' min='1' max='40' value='12' /></label>
          <label>Slide strategy
            <select id='slide-strategy' name='slideStrategy'>
              <option value='platform' selected>Group by channel / platform</option>
              <option value='placement'>One slide per placement</option>
              <option value='compact'>Compact summary</option>
            </select>
          </label>
          <label>Brand look
            <select id='template-style' name='templateStyle'>
              <option value='gatorade' selected>Sport brand</option>
              <option value='agency-clean'>Clean agency</option>
              <option value='dark-launch'>Dark launch</option>
              <option value='high-contrast'>High contrast</option>
            </select>
          </label>
          <label class='template-upload' for='template-file'>
            <input id='template-file' class='file-input' type='file' accept='.pptx,.potx' />
            <span>Add brand template</span>
            <small id='template-status'>No template added</small>
          </label>
          <div class='swatch-row' aria-label='Brand look presets'>
            <button type='button' class='swatch-option active' data-template-style='gatorade'><span style='--swatch-a:#ffd400;--swatch-b:#00a7a7'></span>Sport</button>
            <button type='button' class='swatch-option' data-template-style='agency-clean'><span style='--swatch-a:#f5f5f0;--swatch-b:#111111'></span>Clean</button>
            <button type='button' class='swatch-option' data-template-style='dark-launch'><span style='--swatch-a:#15171c;--swatch-b:#ffcf24'></span>Dark</button>
            <button type='button' class='swatch-option' data-template-style='high-contrast'><span style='--swatch-a:#ffffff;--swatch-b:#0057ff'></span>Bold</button>
          </div>
          """))
          sub(INDEX, r"<button id='export-ppt' type='button' class='secondary'>.*?</button>\s*<button id='print-brief' type='button'>.*?</button>", clean("""
          <button id='export-ppt' type='button' class='secondary'>Export PowerPoint</button>
          <button id='export-google' type='button' class='secondary'>Export Google Slides</button>
          <button id='print-brief' type='button'>Export PDF</button>
          """))
          sub(INDEX, r"await import\('\./src/app\.js\?v=[^']+'\);", f"await import('./src/app.js?v={cache_stamp}');")

          # Media-plan source reasoning.
          insert_before(MEDIA, "\nexport function statusLabel(status) {", clean("""
          export function buildSpecSnapshot(group, limit = 4) {
            const importedSpecs = (group?.specNotes || [])
              .filter(Boolean)
              .map((spec) => conciseText(spec, 120));
            const librarySpecs = specSummary(group?.matchedPlacement, limit);
            const rows = [
              ...(group?.channels || []).slice(0, 1).map((channel) => `Channel: ${channel}`),
              ...(group?.partners || []).slice(0, 1).map((partner) => `Partner: ${partner}`),
              ...(group?.formats || []).slice(0, 1).map((format) => `Format: ${format}`),
              ...importedSpecs,
              ...librarySpecs
            ];
            return [...new Set(rows)].slice(0, limit);
          }
          """), 'export function buildSpecSnapshot')
          sub(MEDIA, r"function sourceUrlsForRow\(row\) \{.*?\n\}\n\nfunction officialSpecQuery", clean("""
          function sourceUrlsForRow(row) {
            const text = normalize([row.bucket, row.channel, row.partner, row.asset, row.assetFormat, row.specs].join(' '));
            const urls = [];
            if (/meta|instagram|facebook/.test(text)) urls.push('https://www.facebook.com/business/ads-guide');
            if (/tiktok/.test(text)) urls.push('https://ads.tiktok.com/help/article/video-ads-specifications');
            if (/youtube|google/.test(text)) urls.push('https://support.google.com/google-ads/answer/2375464');
            if (/pinterest/.test(text)) urls.push('https://help.pinterest.com/en/business/article/creative-specs');
            if (/\bx\b|twitter|amplify/.test(text)) urls.push('https://business.x.com/en/help/campaign-setup/creative-ad-specifications.html');
            if (/spotify/.test(text)) urls.push('https://ads.spotify.com/en-US/ad-specs/');
            if (/pandora|sxm|siriusxm|soundcloud/.test(text)) urls.push('https://www.sxmmedia.com/');
            if (/audacy/.test(text)) urls.push('https://audacyinc.com/advertising/');
            if (/iheart/.test(text)) urls.push('https://www.iheartmedia.com/advertising/');
            if (/programmatic|display|banner|dv360|dsp|iab|300x250|728x90|160x600|320x50|300x600/.test(text)) {
              urls.push('https://iabtechlab.com/standards/iab-new-ad-portfolio-guidelines/');
            }
            if (/ctv|connected tv/.test(text)) urls.push('https://iabtechlab.com/standards/ctv-ad-portfolio/');
            return urls;
          }

          function officialSpecQuery
          """))
          sub(MEDIA, r"function officialSpecQuery\(group\) \{.*?\n\}\n\nfunction toCandidateLines", clean("""
          function officialSpecQuery(group) {
            const text = normalize([group.platform, group.placementName, ...(group.partners || []), ...(group.assets || [])].join(' '));
            if (/meta|instagram|facebook/.test(text)) return 'Meta ads guide image video creative specifications official';
            if (/tiktok/.test(text)) return 'TikTok ads creative specifications official';
            if (/youtube|google/.test(text)) return 'Google Ads video ad specifications official';
            if (/pinterest/.test(text)) return 'Pinterest business creative specs official';
            if (/\bx\b|twitter|amplify/.test(text)) return 'X ads creative ad specifications official';
            if (/spotify/.test(text)) return 'Spotify audio ad specs official';
            if (/pandora|sxm|siriusxm|soundcloud/.test(text)) return 'SXM Media Pandora audio advertising specs official';
            if (/audacy/.test(text)) return 'Audacy audio ad specs official';
            if (/iheart/.test(text)) return 'iHeartMedia audio advertising specs official';
            if (/podcast|audio/.test(text)) return 'audio ad specs podcast advertising official';
            if (/programmatic|display|banner|dv360|dsp|iab/.test(text)) return 'IAB new ad portfolio display ad specs official';
            if (/roku|disney|lg|brightline|custom/.test(text)) return `${group.placementName} advertising specs official`;
            if (/ooh|gstv|cooler/.test(text)) return `${group.placementName} OOH advertising specs official`;
            return `${group.platform} ${group.placementName} ad specs official`;
          }

          function toCandidateLines
          """))

          # Tests for source/source-spec reasoning.
          if 'buildSpecSnapshot' not in read(TEST).split('} from', 1)[0]:
              replace(TEST, "  buildGroups,\n  buildSearchPack,\n  buildSlidePlan,", "  buildGroups,\n  buildSearchPack,\n  buildSpecSnapshot,\n  buildSlidePlan,")
          test_text = read(TEST)
          if 'prioritizes partner-specific source links and compact spec snapshots' not in test_text:
              block = clean(r'''
              
                it('prioritizes partner-specific source links and compact spec snapshots', () => {
                  const text = inventoryRowsToPlanText(extractInventoryTableRows(fixtureRows, 'Lower Sugar Plan'));
                  const rows = parsePlan(text, placementLibrary);
                  const items = rows.map((row, index) => ({ index: index + 1, raw: row, ...findBestPlacement(row, placementLibrary) }));
                  const groups = buildGroups(items);
                  const pandoraAudio = groups.find((group) => group.platform === 'AUDIO' && /SXM\/Pandora/.test(group.placementName));
                  const spotifyAudio = groups.find((group) => group.platform === 'AUDIO' && /Spotify/.test(group.placementName));
                  const programmatic = groups.find((group) => group.platform === 'PROGRAMMATIC');
                  const audioSearchPack = buildSearchPack(pandoraAudio, { clientName: 'Gatorade Lower Sugar' });

                  assert.ok(pandoraAudio.matchedPlacement.sourceUrls.some((url) => /sxmmedia/i.test(url)));
                  assert.ok(spotifyAudio.matchedPlacement.sourceUrls.some((url) => /ads\.spotify/i.test(url)));
                  assert.ok(programmatic.matchedPlacement.sourceUrls.some((url) => /iab/i.test(url)));
                  assert.ok(!pandoraAudio.matchedPlacement.sourceUrls.some((url) => /business\.x\.com/i.test(url)));
                  assert.match(audioSearchPack[0].query, /SXM|Pandora|audio/i);
                  assert.ok(buildSpecSnapshot(pandoraAudio, 3).some((spec) => /Streaming Audio|Audio Spot|SXM\/Pandora/i.test(spec)));
                });
              ''')
              head, tail = test_text.rsplit('\n});', 1)
              write(TEST, head + '\n' + block + '\n});' + tail)

          # App wiring.
          app_text = read(APP)
          if 'const exportGoogleButton' not in app_text:
              replace(APP, clean("""
              const exportPptButton = document.querySelector('#export-ppt');
              const printBriefButton = document.querySelector('#print-brief');
              const approveConfidentButton = document.querySelector('#approve-confident');
              const markAllTbdButton = document.querySelector('#mark-all-tbd');
              const stepButtons = [...document.querySelectorAll('.step-button')];
              const stepPanels = [...document.querySelectorAll('.step-panel')];
              """), clean("""
              const exportPptButton = document.querySelector('#export-ppt');
              const exportGoogleButton = document.querySelector('#export-google');
              const printBriefButton = document.querySelector('#print-brief');
              const approveConfidentButton = document.querySelector('#approve-confident');
              const approveSelectedButton = document.querySelector('#approve-selected');
              const markAllTbdButton = document.querySelector('#mark-all-tbd');
              const templateFileInput = document.querySelector('#template-file');
              const templateStatus = document.querySelector('#template-status');
              const stepButtons = [...document.querySelectorAll('.step-button')];
              const stepPanels = [...document.querySelectorAll('.step-panel')];
              const swatchButtons = [...document.querySelectorAll('[data-template-style]')];
              """))
          insert_before(APP, "\nconst samplePlan =", clean("""
          const brandStylePresets = {
            gatorade: { label: 'Sport brand', primaryColor: '#ffd400', accentColor: '#00a7a7', backgroundColor: '#ffffff', textColor: '#111111' },
            'agency-clean': { label: 'Clean agency', primaryColor: '#f5f5f0', accentColor: '#111111', backgroundColor: '#ffffff', textColor: '#111111' },
            'dark-launch': { label: 'Dark launch', primaryColor: '#15171c', accentColor: '#ffcf24', backgroundColor: '#111111', textColor: '#ffffff' },
            'high-contrast': { label: 'High contrast', primaryColor: '#ffffff', accentColor: '#0057ff', backgroundColor: '#ffffff', textColor: '#111111' }
          };
          """), 'const brandStylePresets')
          app_text = read(APP)
          if 'selectedGroups' not in app_text:
              replace(APP, "  decisions: {},\n  sourceNotes: {},\n  options: defaultOptions()", "  decisions: {},\n  selectedGroups: {},\n  sourceNotes: {},\n  sourceImages: {},\n  template: null,\n  options: defaultOptions()")
          app_text = read(APP)
          if 'exportGoogleButton.addEventListener' not in app_text:
              replace(APP, clean("""
              exportJsonButton.addEventListener('click', exportBriefJson);
              exportPptButton.addEventListener('click', exportPowerPointBrief);
              printBriefButton.addEventListener('click', () => window.print());
              approveConfidentButton.addEventListener('click', approveConfidentGroups);
              markAllTbdButton.addEventListener('click', markAllTbd);
              themeToggle.addEventListener('click', toggleTheme);
              """), clean("""
              exportJsonButton.addEventListener('click', exportBriefJson);
              exportPptButton.addEventListener('click', exportPowerPointBrief);
              exportGoogleButton.addEventListener('click', exportGoogleSlidesBrief);
              printBriefButton.addEventListener('click', () => window.print());
              approveConfidentButton.addEventListener('click', approveAllGroups);
              approveSelectedButton.addEventListener('click', approveSelectedGroups);
              markAllTbdButton.addEventListener('click', markAllTbd);
              templateFileInput.addEventListener('change', handleTemplateSelection);
              themeToggle.addEventListener('click', toggleTheme);
              """))
          app_text = read(APP)
          if 'handleReviewSelection' not in app_text:
              replace(APP, clean("""
              reviewList.addEventListener('click', handleReviewAction);
              sourceList.addEventListener('input', handleSourceNote);
              """), clean("""
              reviewList.addEventListener('click', handleReviewAction);
              reviewList.addEventListener('change', handleReviewSelection);
              sourceList.addEventListener('input', handleSourceInput);
              for (const button of swatchButtons) button.addEventListener('click', handleTemplateStyleButton);
              """))
          insert_before(APP, "async function readPlanFile(file) {", clean("""
          async function handleTemplateSelection(event) {
            const file = event.target.files?.[0];
            if (!file) return;
            try {
              templateStatus.textContent = `Reading ${file.name}`;
              state.template = await readTemplateProfile(file);
              templateStatus.textContent = `${file.name} loaded`;
              collectOptions();
              updateInterface();
              showToast('Brand template loaded. Export colors updated.');
            } catch (error) {
              state.template = { name: file.name, colors: null };
              templateStatus.textContent = `${file.name} added`;
              collectOptions();
              updateInterface();
              showToast('Template added. Theme colors could not be read, so the selected brand look stays active.');
            }
          }

          async function readTemplateProfile(file) {
            const JSZip = await loadJsZip();
            const zip = await JSZip.loadAsync(await file.arrayBuffer());
            const themeFile = zip.files['ppt/theme/theme1.xml'];
            const colors = themeFile ? extractTemplateColors(await themeFile.async('text')) : null;
            return { name: file.name, colors };
          }

          function extractTemplateColors(xml) {
            const colors = [...xml.matchAll(/<a:srgbClr[^>]+val="([0-9A-Fa-f]{6})"/g)]
              .map((match) => `#${match[1]}`)
              .filter(isUsefulTemplateColor);
            if (!colors.length) return null;
            return {
              primaryColor: colors[0],
              accentColor: colors[1] || colors[0],
              backgroundColor: colors.find((color) => !isDarkColor(color)) || '#ffffff',
              textColor: isDarkColor(colors[0]) ? '#ffffff' : '#111111'
            };
          }

          function isUsefulTemplateColor(color) {
            const normalized = color.toLowerCase();
            return !['#ffffff', '#000000', '#f2f2f2', '#e7e6e6'].includes(normalized);
          }

          function isDarkColor(color) {
            const hex = String(color || '#111111').replace('#', '');
            const red = parseInt(hex.slice(0, 2), 16);
            const green = parseInt(hex.slice(2, 4), 16);
            const blue = parseInt(hex.slice(4, 6), 16);
            return (red * 0.299 + green * 0.587 + blue * 0.114) < 130;
          }
          """), 'async function handleTemplateSelection')
          app_text = read(APP)
          if 'state.selectedGroups = {};' not in app_text:
              replace(APP, "  state.decisions = {};\n  state.sourceNotes = {};", "  state.decisions = {};\n  state.selectedGroups = {};\n  state.sourceNotes = {};\n  state.sourceImages = {};")

          review_functions = clean("""
          function seedReviewDecisions() {
            const next = {};
            const selected = {};
            for (const group of state.groups) {
              next[group.key] = state.decisions[group.key] || 'tbd';
              selected[group.key] = state.selectedGroups[group.key] || false;
            }
            state.decisions = next;
            state.selectedGroups = selected;
          }

          function handleReviewAction(event) {
            const button = event.target.closest('[data-review-action]');
            if (!button) return;
            state.decisions[button.dataset.groupKey] = button.dataset.reviewAction;
            updateInterface();
          }

          function handleReviewSelection(event) {
            const field = event.target.closest('[data-select-group]');
            if (!field) return;
            state.selectedGroups[field.dataset.selectGroup] = field.checked;
            event.target.closest('.review-item')?.classList.toggle('selected-for-bulk', field.checked);
          }

          function approveAllGroups() {
            for (const group of state.groups) {
              if (state.decisions[group.key] !== 'rejected') state.decisions[group.key] = 'approved';
            }
            updateInterface();
          }

          function approveSelectedGroups() {
            let count = 0;
            for (const group of state.groups) {
              if (!state.selectedGroups[group.key]) continue;
              state.decisions[group.key] = 'approved';
              count += 1;
            }
            if (!count) return showToast('Select one or more matches first.');
            updateInterface();
          }

          function markAllTbd() {
            for (const group of state.groups) state.decisions[group.key] = 'tbd';
            updateInterface();
          }

          function handleSourceInput(event) {
            const noteField = event.target.closest('[data-source-note]');
            if (noteField) {
              state.sourceNotes[noteField.dataset.sourceNote] = noteField.value;
              renderBrief();
              return;
            }
            const imageField = event.target.closest('[data-source-image]');
            if (imageField) {
              state.sourceImages[imageField.dataset.sourceImage] = imageField.value.trim();
              renderBrief();
            }
          }
          """)
          sub(APP, r"function seedReviewDecisions\(\) \{.*?\n\}\n\nfunction goToStep", review_functions + "\n\nfunction goToStep")

          review_card = clean("""
          function buildReviewCard(group) {
            const status = state.decisions[group.key] || 'tbd';
            const card = document.createElement('article');
            card.className = `review-item status-${status}${state.selectedGroups[group.key] ? ' selected-for-bulk' : ''}`;
            const specs = BriefCore.buildSpecSnapshot(group, 4).map((spec) => `<span>${escapeHtml(spec)}</span>`).join('') || '<span>Confirm specs manually</span>';
            const units = group.units || group.rows.length;
            const confidence = Math.round(group.confidence * 100);
            const notes = conciseText(group.notes.filter(Boolean).join(' | '), 120);

            card.innerHTML = `
              <div class="review-main">
                <label class="select-group"><input type="checkbox" data-select-group="${escapeAttribute(group.key)}" ${state.selectedGroups[group.key] ? 'checked' : ''} /> Select</label>
                <div>
                  <strong>${escapeHtml(group.placementName)}</strong>
                  <p>${escapeHtml(group.matchedPlacement?.assetType || 'Needs spec setup')} - ${confidence}% confidence - ${group.rows.length} row${group.rows.length === 1 ? '' : 's'} - ${units} unit${units === 1 ? '' : 's'}</p>
                </div>
                <span class="status-chip">${statusLabel(status)}</span>
              </div>
              <div class="chip-row spec-snapshot">${specs}</div>
              ${notes ? `<p class="review-note">${escapeHtml(notes)}</p>` : ''}
              <div class="review-actions" role="group" aria-label="Review ${escapeAttribute(group.placementName)}">
                <button type="button" class="choice approve ${status === 'approved' ? 'selected' : ''}" data-group-key="${escapeAttribute(group.key)}" data-review-action="approved">Approve</button>
                <button type="button" class="choice tbd ${status === 'tbd' ? 'selected' : ''}" data-group-key="${escapeAttribute(group.key)}" data-review-action="tbd">TBD</button>
                <button type="button" class="choice reject ${status === 'rejected' ? 'selected' : ''}" data-group-key="${escapeAttribute(group.key)}" data-review-action="rejected">Needs fix</button>
              </div>
            `;
            return card;
          }
          """)
          sub(APP, r"function buildReviewCard\(group\) \{.*?\n\}\n\nfunction renderSources", review_card + "\n\nfunction renderSources")

          render_sources = clean("""
          function renderSources() {
            const groups = outputGroups();
            if (!groups.length) {
              sourceList.className = 'source-list empty-state';
              sourceList.textContent = 'Approve or mark placements TBD to build the source package.';
              return;
            }

            sourceList.className = 'source-list scroll-box';
            sourceList.innerHTML = '';

            for (const group of groups) {
              const placement = group.matchedPlacement;
              const card = document.createElement('article');
              card.className = 'source-card';
              const sourceLinks = (placement?.sourceUrls || []).map(toSourceLink).join('') || '<span class="muted">No source URLs in the spec library yet.</span>';
              const specSnapshot = BriefCore.buildSpecSnapshot(group, 4).map((spec) => `<span>${escapeHtml(spec)}</span>`).join('') || '<span>Confirm specs manually.</span>';
              const searchTiles = buildSearchPack(group).map(toSearchTile).join('');
              const note = state.sourceNotes[group.key] || '';
              const image = state.sourceImages[group.key] || '';

              card.innerHTML = `
                <div class="source-card-header">
                  <div>
                    <strong>${escapeHtml(group.platform)} - ${escapeHtml(group.placementName)}</strong>
                    <p>${statusLabel(state.decisions[group.key])} - verify with official specs first, then add the best example image.</p>
                  </div>
                  <span class="confidence-chip">${Math.round(group.confidence * 100)}%</span>
                </div>
                <div class="spec-snapshot"><strong>Projected specs</strong>${specSnapshot}</div>
                <div class="source-links">${sourceLinks}</div>
                <div class="clip-grid">${searchTiles}</div>
                <label class="note-field">Example image URL<input data-source-image="${escapeAttribute(group.key)}" type="url" value="${escapeAttribute(image)}" placeholder="Paste the best image URL to include in the deck" /></label>
                <label class="note-field">Reference notes<textarea data-source-note="${escapeAttribute(group.key)}" rows="3" placeholder="Paste source notes, spec caveats, or visual direction here.">${escapeHtml(note)}</textarea></label>
              `;
              sourceList.append(card);
            }
          }
          """)
          sub(APP, r"function renderSources\(\) \{.*?\n\}\n\nfunction buildSearchPack", render_sources + "\n\nfunction buildSearchPack")

          options_block = clean("""
          function collectOptions() {
            const templateStyle = document.querySelector('#template-style')?.value || 'gatorade';
            const preset = brandStylePresets[templateStyle] || brandStylePresets.gatorade;
            const templateColors = state.template?.colors || {};
            const primaryColor = templateColors.primaryColor || preset.primaryColor;
            const accentColor = templateColors.accentColor || preset.accentColor;
            const backgroundColor = templateColors.backgroundColor || preset.backgroundColor;
            const textColor = templateColors.textColor || preset.textColor;
            state.options = {
              clientName: document.querySelector('#client-name')?.value.trim() || 'Client / brand',
              campaignName: document.querySelector('#campaign-name')?.value.trim() || 'Campaign name',
              campaignYear: document.querySelector('#campaign-year')?.value.trim() || '',
              slideCount: Math.max(1, Number(document.querySelector('#slide-count')?.value || 12)),
              slideStrategy: document.querySelector('#slide-strategy')?.value || 'platform',
              templateStyle,
              templateName: state.template?.name || '',
              primaryColor,
              accentColor,
              backgroundColor,
              textColor,
              includeSafeZones: Boolean(document.querySelector('#include-safe-zones')?.checked),
              includeSources: Boolean(document.querySelector('#include-sources')?.checked),
              includeSearches: Boolean(document.querySelector('#include-searches')?.checked),
              includeReviewStatus: Boolean(document.querySelector('#include-review-status')?.checked)
            };
            document.documentElement.style.setProperty('--client-primary', state.options.primaryColor);
            document.documentElement.style.setProperty('--client-accent', state.options.accentColor);
            previewClient.textContent = state.options.clientName;
            previewCampaign.textContent = [state.options.campaignName, state.options.campaignYear, state.options.templateName && `Template: ${state.options.templateName}`].filter(Boolean).join(' - ');
            for (const button of swatchButtons) button.classList.toggle('active', button.dataset.templateStyle === templateStyle && !state.template?.colors);
          }

          function defaultOptions() {
            return {
              clientName: 'Client / brand',
              campaignName: 'Campaign name',
              campaignYear: '',
              slideCount: 12,
              slideStrategy: 'platform',
              templateStyle: 'gatorade',
              templateName: '',
              primaryColor: '#ffd400',
              accentColor: '#00a7a7',
              backgroundColor: '#ffffff',
              textColor: '#111111',
              includeSafeZones: true,
              includeSources: true,
              includeSearches: true,
              includeReviewStatus: true
            };
          }

          function handleTemplateStyleButton(event) {
            const button = event.target.closest('[data-template-style]');
            if (!button) return;
            const select = document.querySelector('#template-style');
            if (select) select.value = button.dataset.templateStyle;
            state.template = null;
            if (templateFileInput) templateFileInput.value = '';
            if (templateStatus) templateStatus.textContent = 'No template added';
            collectOptions();
            renderDeckPlan();
            renderBrief();
          }
          """)
          sub(APP, r"function collectOptions\(\) \{.*?\n\}\n\nfunction renderDeckPlan", options_block + "\n\nfunction renderDeckPlan")
          replace(APP, "  deckCount.textContent = `${totalSlides} slide${totalSlides === 1 ? '' : 's'} planned`;", "  deckCount.textContent = totalSlides ? `${totalSlides} slide${totalSlides === 1 ? '' : 's'} in outline` : 'Deck outline';", required=False)
          replace(APP, "      <p>Verification links, official-search prompts, image searches, and notes.</p>", "      <p>Official links, projected specs, example image slots, and notes.</p>", required=False)

          brief_group = clean("""
          function renderBriefGroup(group) {
            const placement = group.matchedPlacement;
            const status = state.decisions[group.key] || 'tbd';
            const specs = BriefCore.buildSpecSnapshot(group, 5).map((spec) => `<li>${escapeHtml(spec)}</li>`).join('') || '<li>Confirm specs manually.</li>';
            const copyFields = (placement?.copyFields || []).slice(0, 4).map((field) => `<li>${escapeHtml(field.label)} - ${escapeHtml(field.limit)}</li>`).join('') || '<li>Confirm copy fields manually.</li>';
            const prompts = (placement?.creativePrompts || []).slice(0, 3).map((prompt) => `<li>${escapeHtml(prompt)}</li>`).join('');
            const note = state.sourceNotes[group.key] ? `<p><strong>Reference notes:</strong> ${escapeHtml(state.sourceNotes[group.key])}</p>` : '';
            const image = state.sourceImages[group.key]
              ? `<figure class="brief-example-image"><img src="${escapeAttribute(state.sourceImages[group.key])}" alt="Example reference for ${escapeAttribute(group.placementName)}" loading="lazy" /><figcaption>Example reference</figcaption></figure>`
              : '';

            return `
              <article class="brief-placement">
                <header><strong>${escapeHtml(group.platform)} - ${escapeHtml(group.placementName)}</strong>${state.options.includeReviewStatus ? `<span>${escapeHtml(statusLabel(status))}</span>` : ''}</header>
                ${image}
                ${state.options.includeSafeZones ? buildSafeZoneMarkup(placement) : ''}
                <div class="grid-two compact-grid"><div><h4>Specs</h4><ul>${specs}</ul></div><div><h4>Copy</h4><ul>${copyFields}</ul></div></div>
                ${prompts ? `<h4>Creative prompts</h4><ul>${prompts}</ul>` : ''}
                ${note}
              </article>
            `;
          }
          """)
          sub(APP, r"function renderBriefGroup\(group\) \{.*?\n\}\n\nfunction buildSafeZoneMarkup", brief_group + "\n\nfunction buildSafeZoneMarkup")

          source_appendix = clean("""
          function buildSourceAppendix() {
            const appendix = document.createElement('section');
            appendix.className = 'brief-card source-appendix';
            appendix.innerHTML = `<div class="brief-card-header"><div><p class="platform">Appendix</p><h3>Sources and searches</h3></div></div>`;
            const list = document.createElement('div');
            list.className = 'appendix-list';

            for (const group of outputGroups()) {
              const links = (group.matchedPlacement?.sourceUrls || []).map(toSourceLink).join('') || '<span class="muted">No source links yet.</span>';
              const searches = state.options.includeSearches ? buildSearchPack(group).slice(0, 2).map((item) => `<span>${escapeHtml(item.query)}</span>`).join('') : '';
              const image = state.sourceImages[group.key] ? `<p><strong>Example image:</strong> ${escapeHtml(state.sourceImages[group.key])}</p>` : '';
              const note = state.sourceNotes[group.key] ? `<p>${escapeHtml(state.sourceNotes[group.key])}</p>` : '';
              list.insertAdjacentHTML('beforeend', `<article><strong>${escapeHtml(group.platform)} - ${escapeHtml(group.placementName)}</strong><div class="source-links">${links}</div><div class="chip-row">${searches}</div>${image}${note}</article>`);
            }

            appendix.append(list);
            return appendix;
          }
          """)
          sub(APP, r"function buildSourceAppendix\(\) \{.*?\n\}\n\nfunction outputGroups", source_appendix + "\n\nfunction outputGroups")

          group_plain = clean("""
          function groupToPlainText(group) {
            const placement = group.matchedPlacement;
            return [
              `${group.platform} - ${group.placementName}`,
              `Status: ${statusLabel(state.decisions[group.key] || 'tbd')}`,
              `Confidence: ${Math.round(group.confidence * 100)}%`,
              `Specs: ${BriefCore.buildSpecSnapshot(group, 5).join('; ') || 'Confirm manually'}`,
              `Copy: ${(placement?.copyFields || []).map((field) => `${field.label} (${field.limit})`).join('; ') || 'Confirm manually'}`,
              state.sourceImages[group.key] ? `Example image: ${state.sourceImages[group.key]}` : '',
              state.sourceNotes[group.key] ? `Reference notes: ${state.sourceNotes[group.key]}` : ''
            ].filter(Boolean);
          }
          """)
          sub(APP, r"function groupToPlainText\(group\) \{.*?\n\}\n\nfunction exportBriefJson", group_plain + "\n\nfunction exportBriefJson")
          replace(APP, "      sourceNotes: state.sourceNotes[group.key] || '',\n      specs: specSummary(group.matchedPlacement, 10)", "      sourceNotes: state.sourceNotes[group.key] || '',\n      sourceImage: state.sourceImages[group.key] || '',\n      specs: BriefCore.buildSpecSnapshot(group, 10)", required=False)

          ppt_block = clean("""
          async function exportGoogleSlidesBrief() {
            await exportPowerPointBrief({
              fileSuffix: 'google-slides-import',
              toast: 'Google Slides-ready PowerPoint exported. Upload it to Google Slides to convert the deck.'
            });
          }

          async function exportPowerPointBrief({ fileSuffix = 'powerpoint', toast = 'PowerPoint exported.' } = {}) {
            const slides = buildSlidePlan();
            if (!slides.length) return showToast('Generate a brief first.');

            const imported = await import(cdn.pptx);
            const PptxGenJS = imported.default || imported;
            const pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_WIDE';
            pptx.author = 'Digital Task Brief Maker';
            pptx.subject = 'Digital Task Brief';
            pptx.title = `${state.options.clientName} Digital Task Brief`;
            pptx.company = state.options.templateName || 'AgencyThings';

            const titleSlide = pptx.addSlide();
            const darkExport = document.body.classList.contains('dark-mode') || isDarkColor(state.options.backgroundColor || state.options.primaryColor);
            const titleBg = darkExport ? '#111111' : (state.options.backgroundColor || state.options.primaryColor);
            const titleText = darkExport ? '#ffffff' : (state.options.textColor || '#111111');
            titleSlide.background = { color: hexForPpt(titleBg) };
            titleSlide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 13.34, h: 0.24, fill: { color: hexForPpt(state.options.accentColor) }, line: { color: hexForPpt(state.options.accentColor) } });
            titleSlide.addText(state.options.clientName, { x: 0.55, y: 0.62, w: 12, h: 0.55, fontSize: 30, bold: true, color: hexForPpt(titleText) });
            titleSlide.addText([state.options.campaignName, state.options.campaignYear].filter(Boolean).join(' - '), { x: 0.55, y: 1.28, w: 11.5, h: 0.38, fontSize: 17, color: hexForPpt(darkExport ? state.options.accentColor : '#333333') });
            titleSlide.addText(`${outputGroups().length} placement groups`, { x: 0.55, y: 2.05, w: 8, h: 0.35, fontSize: 13, color: hexForPpt(darkExport ? '#eeeeee' : '#333333') });
            if (state.options.templateName) titleSlide.addText(`Template reference: ${state.options.templateName}`, { x: 0.55, y: 2.45, w: 10, h: 0.25, fontSize: 9, color: hexForPpt(darkExport ? '#cccccc' : '#555555') });
            titleSlide.addText(`Generated ${new Date().toLocaleString()}`, { x: 0.55, y: 6.65, w: 8, h: 0.25, fontSize: 8, color: hexForPpt(darkExport ? '#cccccc' : '#555555') });

            for (const [index, slidePlan] of slides.entries()) {
              const slide = pptx.addSlide();
              slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 13.34, h: 0.18, fill: { color: hexForPpt(state.options.primaryColor) }, line: { color: hexForPpt(state.options.primaryColor) } });
              slide.addText(`Slide ${index + 1}: ${slidePlan.title}`, { x: 0.45, y: 0.38, w: 12.2, h: 0.4, fontSize: 20, bold: true, color: '111111' });

              let y = 1.05;
              const hasImages = slidePlan.groups.some((group) => state.sourceImages[group.key]);
              const textWidth = hasImages ? 8.95 : 12;
              for (const group of slidePlan.groups) {
                const placement = group.matchedPlacement;
                const imageUrl = state.sourceImages[group.key];
                slide.addText(`${group.platform} - ${group.placementName}`, { x: 0.55, y, w: textWidth, h: 0.28, fontSize: 13, bold: true, color: '111111' });
                slide.addText(`Status: ${statusLabel(state.decisions[group.key] || 'tbd')} | Confidence: ${Math.round(group.confidence * 100)}%`, { x: hasImages ? 9.75 : 6.8, y, w: hasImages ? 2.7 : 5.5, h: 0.25, fontSize: 9, color: '555555' });
                y += 0.32;
                slide.addText(`Specs: ${BriefCore.buildSpecSnapshot(group, 4).join(' | ') || 'Confirm manually'}`, { x: 0.55, y, w: textWidth, h: 0.38, fontSize: 7.8, color: '222222', breakLine: false });
                y += 0.46;
                slide.addText(`Copy: ${(placement?.copyFields || []).slice(0, 3).map((field) => `${field.label} (${field.limit})`).join(' | ') || 'Confirm manually'}`, { x: 0.55, y, w: textWidth, h: 0.35, fontSize: 7.8, color: '222222', breakLine: false });
                if (imageUrl) addImageToSlide(slide, imageUrl, { x: 9.85, y: y - 0.78, w: 2.75, h: 1.05 });
                y += 0.56;
              }
            }

            if (state.options.includeSources) {
              const sourceRows = outputGroups().map((group) => {
                const urls = (group.matchedPlacement?.sourceUrls || []).join(' | ');
                const searches = buildSearchPack(group).slice(0, 2).map((item) => `${item.label}: ${item.query}`).join(' | ');
                const image = state.sourceImages[group.key] ? `Image: ${state.sourceImages[group.key]}` : '';
                const note = state.sourceNotes[group.key] ? `Notes: ${state.sourceNotes[group.key]}` : '';
                return `${group.platform} - ${group.placementName}: ${[urls, searches, image, note].filter(Boolean).join(' | ')}`;
              });
              for (const [index, rows] of chunk(sourceRows, 10).entries()) {
                const sourceSlide = pptx.addSlide();
                sourceSlide.addText(`Sources and searches ${index + 1}/${Math.ceil(sourceRows.length / 10)}`, { x: 0.45, y: 0.35, w: 12, h: 0.45, fontSize: 22, bold: true, color: '111111' });
                sourceSlide.addText(rows.join('\n'), { x: 0.55, y: 1.0, w: 12, h: 5.7, fontSize: 7.4, color: '222222', breakLine: false });
              }
            }

            await pptx.writeFile({ fileName: `digital-task-brief-${dateStamp(true)}-${fileSuffix}.pptx` });
            showToast(toast);
          }

          function addImageToSlide(slide, url, placement) {
            try {
              const source = url.startsWith('data:image/') ? { data: url } : { path: url };
              slide.addImage({ ...source, ...placement });
              return true;
            } catch {
              slide.addText(`Image: ${url}`, { ...placement, fontSize: 6.8, color: '555555', fit: 'shrink' });
              return false;
            }
          }
          """)
          sub(APP, r"async function exportPowerPointBrief\(\) \{.*?\n\}\n\nfunction specSummary", ppt_block + "\n\nfunction specSummary")

          # CSS overrides for upgraded controls.
          css = read(CSS)
          if 'Template/source upgrade overrides' not in css:
              write(CSS, css + "\n" + clean(r'''
              
              /* Template/source upgrade overrides */
              :root { --success: #13795b; --warning: #b7791f; }
              input[type="url"] { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 0.75rem; color: var(--ink); background: var(--panel); }
              .paste-panel { display: grid; grid-template-rows: auto 1fr; min-height: 22rem; border: 1px solid var(--line); border-radius: 8px; padding: 0.85rem; background: color-mix(in srgb, var(--soft) 70%, var(--panel)); }
              .paste-panel-header { margin-bottom: 0.75rem; }
              .paste-panel-header label { margin-bottom: 0.18rem; color: var(--ink); font-size: 0.98rem; }
              .paste-panel-header small { display: block; color: var(--muted); line-height: 1.4; }
              .paste-panel textarea { min-height: 100%; overflow: auto; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.86rem; line-height: 1.45; white-space: pre; }
              .platform-group { padding: 0; overflow: hidden; box-shadow: none; }
              .platform-group header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 0; border-bottom: 1px solid var(--line); padding: 0.85rem 1rem; background: color-mix(in srgb, var(--client-primary) 18%, var(--panel)); }
              .platform-group header h3 { margin: 0; font-size: 1.25rem; text-transform: uppercase; }
              .platform-group header span { color: var(--muted); font-weight: 900; }
              .platform-group-list { padding: 0.8rem; }
              .review-item.selected-for-bulk { outline: 2px solid color-mix(in srgb, var(--client-accent) 42%, transparent); }
              .review-item.status-approved { border-left: 5px solid var(--success); }
              .review-item.status-tbd { border-left: 5px solid var(--warning); }
              .select-group { display: inline-flex; align-items: center; gap: 0.42rem; margin: 0; color: var(--muted); font-size: 0.82rem; white-space: nowrap; }
              .select-group input { width: 1rem; height: 1rem; accent-color: var(--client-accent); }
              .choice { border: 1px solid var(--line); }
              .choice.approve { border-color: color-mix(in srgb, var(--success) 42%, var(--line)); }
              .choice.tbd { border-color: color-mix(in srgb, var(--warning) 45%, var(--line)); }
              .choice.reject { border-color: color-mix(in srgb, var(--danger) 45%, var(--line)); }
              .choice.approve.selected { color: #ffffff; background: var(--success); }
              .choice.tbd.selected { color: #111111; background: #f2c94c; }
              .choice.reject.selected { color: #ffffff; background: var(--danger); }
              .spec-snapshot { display: grid; gap: 0.45rem; border: 1px solid var(--line); border-radius: 8px; padding: 0.7rem; background: var(--soft); }
              .spec-snapshot > strong { font-size: 0.82rem; text-transform: uppercase; }
              .source-checks { display: none; }
              .note-field input { margin-top: 0.15rem; }
              .template-upload { display: grid; min-height: 4.4rem; align-content: center; gap: 0.22rem; border: 1px dashed color-mix(in srgb, var(--client-accent) 55%, var(--line)); border-radius: 8px; padding: 0.75rem; color: var(--ink); background: color-mix(in srgb, var(--client-accent) 10%, var(--panel)); cursor: pointer; }
              .template-upload span { font-weight: 900; }
              .template-upload small { color: var(--muted); font-weight: 700; }
              .swatch-row { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 0.55rem; }
              .swatch-option { display: inline-flex; min-height: 2.45rem; align-items: center; gap: 0.45rem; border: 1px solid var(--line); color: var(--ink); background: var(--panel); }
              .swatch-option span { width: 1.45rem; height: 1.45rem; border: 1px solid var(--line); border-radius: 999px; background: linear-gradient(135deg, var(--swatch-a), var(--swatch-a) 50%, var(--swatch-b) 50%, var(--swatch-b)); }
              .swatch-option.active { border-color: var(--client-accent); box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--client-accent) 28%, transparent); }
              .brief-example-image { display: grid; gap: 0.35rem; max-width: 24rem; margin: 0 0 0.75rem; }
              .brief-example-image img { width: 100%; max-height: 14rem; border: 1px solid var(--line); border-radius: 8px; object-fit: cover; background: var(--panel); }
              .brief-example-image figcaption { color: var(--muted); font-size: 0.78rem; font-weight: 850; }
              '''))
          PY
      - name: Run parser tests
        run: node --test tests/digital-task-brief-maker/media-plan.test.mjs
      - name: Commit and push app upgrade
        run: |
          if git diff --quiet; then
            echo "No app changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/digital-task-brief-maker/index.html tools/digital-task-brief-maker/src/app.js tools/digital-task-brief-maker/src/mediaPlan.js tools/digital-task-brief-maker/src/styles.css tests/digital-task-brief-maker/media-plan.test.mjs
          git commit -m "Upgrade digital task brief template workflow"
          git push origin HEAD:main
          git push origin HEAD:${TARGET_BRANCH}
