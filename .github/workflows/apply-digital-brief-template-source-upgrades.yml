name: Apply Digital Brief Template Source Upgrades

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/apply-digital-brief-template-source-upgrades.yml

permissions:
  contents: write

env:
  TARGET_BRANCH: version-2-latest-digital-task-brief-maker-2026-06-25-0001-utc

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Recover patch script from previous workflow commit
        run: |
          git show HEAD^:.github/workflows/apply-digital-brief-template-source-upgrades.yml > /tmp/previous-digital-brief-workflow.yml
          python - <<'PY'
          from pathlib import Path
          workflow = Path('/tmp/previous-digital-brief-workflow.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n      - name: Run parser tests"
          if start_marker not in workflow or end_marker not in workflow:
              raise SystemExit('Could not recover the embedded patch script from the previous workflow commit.')
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines)
          exec(compile(script, '/tmp/digital-brief-remote-patch.py', 'exec'), {})
          PY
      - name: Run parser tests
        run: node --test tests/digital-task-brief-maker/media-plan.test.mjs
      - name: Commit and push app upgrade
        run: |
          if git diff --quiet; then
            echo "No app changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/digital-task-brief-maker/index.html tools/digital-task-brief-maker/src/app.js tools/digital-task-brief-maker/src/mediaPlan.js tools/digital-task-brief-maker/src/styles.css tests/digital-task-brief-maker/media-plan.test.mjs
          git commit -m "Upgrade digital task brief template workflow"
          git push origin HEAD:main
          git push origin HEAD:${TARGET_BRANCH}
