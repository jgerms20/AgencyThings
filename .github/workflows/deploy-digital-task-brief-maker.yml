name: Deploy Digital Task Brief Maker

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -R tools/digital-task-brief-maker/. _site/
          touch _site/.nojekyll
          cat > _site/build-info.json <<EOF
          {"build":"guided-workflow","date":"2026-06-26","time":"14:47 PT","sha":"${GITHUB_SHA}"}
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## Digital Task Brief Maker is deployed

          Open this URL:

          ${{ steps.deployment.outputs.page_url }}

          Expected build badge: `Current build: guided workflow - 2026-06-26 2:47 PM PT`

          If the live page still shows an older build, hard refresh the URL or add `?v=2026-06-26-1447-pt-smart-inventory`.
          SUMMARY
